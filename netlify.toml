# Netlify build config for the Weft web app (the hosted, install-free viewport).
#
# This drives a git-connected build. The mobile app takes NO build-time env config — the relay
# URL + anon key travel in the pairing QR the phone scans (see mobile/src/lib/weftClient.ts
# → createTransportFromDescriptor), so there is nothing sensitive to set on the site here.

[build]
  # Repo root so npm workspaces resolve @aasis21/weft-shared before the mobile build.
  base = "."
  command = "npm run build -w @aasis21/weft-mobile"
  publish = "mobile/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback (mirrors mobile/public/_redirects for git-connected deploys).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Camera QR scanning needs HTTPS (Netlify default) + an explicit camera permission policy.
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(self)"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
