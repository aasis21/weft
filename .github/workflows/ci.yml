name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Shared contracts (crypto, pairing, transport, protocol)
        run: npm test -w @aasis21/weft-shared

      - name: Extension relay loop (harness smoke)
        run: node extension/harness/harness.mjs --auto

      - name: Build extension bundle
        run: npm run build -w @aasis21/weft-extension

      - name: Build mobile (web)
        run: npm run build -w @aasis21/weft-mobile
